  - canonical: 바스켓
    kind: concept
    ko: [바스켓, 최소 배상액, 공제액, 기준금액, 누적 최소금액]
    en: [basket, deductible, tipping basket, threshold, first dollar]

  - canonical: 디미니미스
    kind: concept
    ko: [소액 청구 제외, 개별 최소금액, 최소 청구금액]
    en: [de minimis, de-minimis]

  - canonical: 존속기간
