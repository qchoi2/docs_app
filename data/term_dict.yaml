    en: [representations and warranties, representation and warranty, reps and warranties, R&W, RW, warranties]
    note: "'보증'은 保證(guarantee)과 동철 — '연대보증' 문맥 오탐 주의. 영문 warranties 단독은 SHA의 품질보증 문맥 오탐 가능"

  - canonical: 진술보장보험
