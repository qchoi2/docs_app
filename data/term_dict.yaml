# ============================================================
# M&A 계약 조항·개념 용어사전 v2.1 (Claude 사전 작성 — AI-fill A1)
# ------------------------------------------------------------
# v1 → v2: 35 → 79항목. 계약유형별 섹션, kind 필드 도입.
# v2 → v2.1: 진술보장 하위 주제 7항목 + 정의조항·별지 추가 (총 88항목).
#            유지보수 파이프라인(아래) 명문화. dict_version: 2.1
#
# 이 사전은 시스템 전체의 "통제 어휘"다. 다음 네 곳이 canonical
# 태그를 조인 키로 공유한다:
#   1. search_contracts.py 검색어 동의어 확장 (T2)
#   2. doc_meta.clause_map 의 조항 태그 체계 (T3)
#   3. 조항 단위 청킹의 경계/라벨 (T4 임베딩)
#   4. CLAUDE.md 질의 해석 단계의 정규화 목표
#
# 필드:
#   canonical: 표준 태그. kind=clause 항목은 extract_prompt의
#              clause_map canonical 목록과 반드시 동기화할 것.
#   kind:      clause  = 조항으로 태깅·청킹되는 단위
#              concept = 검색 확장 전용 개념어 (조항 태그 아님)
#   ko / en:   부분일치 전제의 표기 변이 (조사·어미 제외 어간 위주)
#   scope:     주로 등장하는 계약유형 (검색 힌트용, 강제 아님)
#   note:      오탐/판독 주의사항
#   expansion_strength: optional. strict|normal|broad. 없으면 normal로 간주.
#              strict+normal은 기본 검색 확장에 포함, broad는 사용자가
#              --broad-expand 같은 별도 옵션을 켰을 때만 포함하는 것을 권장.
#   avoid_expanding_to: optional. 유사하지만 법적으로 구분해야 하므로
#              자동 확장하지 말아야 할 canonical/표현 목록.
#
# 띄어쓰기 변이: FTS5 trigram 색인이 흡수하므로 전수 나열하지 않되,
#   붙여쓰기가 관행인 표기는 명시적으로 수록했다.
# ---- 유지보수 파이프라인 (AI-fill A11, DB 완성 후 반복 실행) ----
# 이 사전은 "선험적 초안 → 코퍼스 유래 보강"의 2단계로 완성된다.
# doc_meta·FTS 색인이 완성될 때마다:
#   1. [수집] definitions_json의 정의어 + FTS 히트 통계(변이별 문서빈도)
#   2. [진단] (a) 고빈도인데 미수록인 표현 → 추가 후보
#            (b) 0히트 변이 → 오타/불필요 후보 (오탐원 제거)
#            (c) 한 변이가 여러 canonical에 걸치는 충돌 → note 보강 후보
#   3. [제안] Claude Code가 pending_terms.yaml 생성 (근거 히트 수 포함)
#   4. [승인] 사람이 승인분만 병합 → dict_version 증가 → 검색 계층은
#            버전만 참조하므로 재색인 불필요 (질의 시점 확장이라서)
# 골든 세트 eval을 병합 전후로 돌려 사전 변경의 회귀 여부를 확인한다.
# ============================================================

terms:

