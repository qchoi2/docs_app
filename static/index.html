<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>계약서 검색</title>
<link rel="stylesheet" href="/static/app.css">
</head>
<body>
<header class="nav-bar">
  <span class="wordmark">계약서 검색</span>
  <span class="mono-eyebrow">READ-ONLY SEARCH MVP</span>
  <span class="spacer"></span>
  <a class="nav-link" href="/operations">운영</a>
  <a class="nav-link" href="/research">리서치</a>
  <a class="nav-link" href="/setup">색인/설정</a>
  <a class="nav-link" href="/settings">API 설정</a>
</header>

<div id="corpus-banner" class="corpus-banner" hidden></div>

<main class="container">
  <section class="search-panel" aria-label="검색">
    <div class="search-row">
      <input id="search-input" class="text-input search-input" type="text"
             placeholder="예: 손해배상 상한 (여러 조건은 쉼표로 구분 — AND 검색)"
             aria-label="검색어" autocomplete="off">
      <button id="search-button" class="button-primary-sm" type="button">검색</button>
      <button id="toggle-filters" class="button-ghost-sm" type="button"
              aria-expanded="false" aria-controls="advanced-filters">고급 필터</button>
    </div>

    <div id="advanced-filters" class="filters feature-card" hidden>
      <label>계약 유형
        <select id="filter-type" class="text-input"><option value="">전체</option></select>
      </label>
      <label>언어
        <select id="filter-lang" class="text-input"><option value="">전체</option></select>
      </label>
      <label>검색 범위
        <select id="filter-expand" class="text-input">
          <option value="strict">정확하게</option>
          <option value="normal" selected>보통</option>
          <option value="broad">넓게</option>
        </select>
      </label>
      <label class="check"><input id="filter-drafts" type="checkbox"> Draft 제외</label>
      <label class="check"><input id="filter-dups" type="checkbox"> 중복본 펼치기</label>
    </div>

    <div id="filter-chips" class="chips" aria-label="적용된 필터"></div>

    <div id="recent-searches" class="recent" hidden>
      <span class="body-muted">최근 검색</span>
      <div id="recent-list" class="chips"></div>
    </div>
  </section>

  <div id="live" aria-live="polite" class="visually-hidden"></div>

  <section aria-label="검색 결과">
    <div id="summary-row" class="summary-row" hidden>
      <span id="summary-text"></span>
      <span id="warning-badges" class="warning-badges"></span>
      <span class="spacer"></span>
      <button id="export-md" class="button-ghost-sm" type="button" disabled>Markdown</button>
      <button id="export-csv" class="button-ghost-sm" type="button" disabled>CSV</button>
      <button id="save-search" class="button-ghost-sm" type="button" disabled>검색 저장</button>
    </div>
    <div id="results"></div>
    <div class="more-row">
      <button id="more-button" class="button-ghost-sm" type="button" hidden>더 보기</button>
    </div>
    <div id="empty-state" class="empty-state" hidden>
      <p class="heading-md">결과가 없습니다</p>
      <p class="body-muted">시도해볼 수 있는 방법:</p>
      <ul class="body-muted empty-hints">
        <li>Draft 제외를 껐다면 Draft 포함으로 검색</li>
        <li>검색 범위를 "넓게"로 변경 (동의어 확장 확대)</li>
        <li>계약 유형/언어 필터 해제</li>
        <li>쉼표로 나눈 AND 조건 수 줄이기</li>
        <li>본문 추출 실패 문서가 있는지 상단 배너 확인</li>
      </ul>
      <p class="body-muted">2글자 검색어는 자동으로 폴백 검색됩니다.</p>
    </div>
  </section>
</main>

<footer class="footer body-muted">
  현재 색인된 문서 기준의 검색 결과입니다 · 단축키: j/k 결과 이동, Enter 검색
</footer>

<script src="/static/app.js"></script>
</body>
</html>
