# ============================================================
# API 예산 설정 — 사용자 입력 파일
# ------------------------------------------------------------
# 모든 유료 API 경로(A9 교차검증, A10 분류 폴백, G1.5 즉답, G2 답변)는
# 이 파일의 상한을 넘을 수 없다. 실제 호출에는 서버 런타임의 ANTHROPIC_API_KEY도 필요하다.
# 아래 두 값만 채우면 된다.
# 값이 비어 있으면(null) 모든 API 도구는 실행을 거부하고 이 파일을
# 채우라고 안내한다. ANTHROPIC_API_KEY가 없으면 예산값이 있어도 API 기능은 disabled다.
# ANTHROPIC_API_KEY는 관리자용 Runtime API Settings UI 입력창에서 받는 것을 기본으로 한다.
# 저장 후 UI에는 키 전문을 다시 표시하지 않고 마지막 4자리만 표시한다.
# Codex용 OpenAI API key는 받지 않는다.
# ============================================================

# ▼▼▼ 사용자 입력 (USD) ▼▼▼
per_call_limit_usd: null    # 1회 API 호출 상한. 권장 시작값: 0.20
per_run_limit_usd:  null    # 1회 실행(질의 1건/배치 1회) 총 상한. 권장 시작값: 2.00
# ▲▲▲ 사용자 입력 끝 ▲▲▲

# 아래는 고정 동작 (수정 불필요):
# - 모든 호출 전 예상 비용(건수 × 토큰 × 단가)을 출력한다.
# - 예상 비용이 per_call/per_run 상한 초과 시 호출하지 않고 중단·안내한다.
# - 모든 호출은 cs_index/api_ledger.jsonl 에 기록된다 (시각·용도·모델·토큰·비용).
# - 캐시 키(model_id + prompt_version + 프롬프트 + 입력 + budget_version)의
#   해시가 같으면 캐시를 반환하고 호출하지 않는다. 모델/프롬프트 버전이 바뀌면
#   캐시는 자동 무효화된다.
# - 재시도는 최대 2회, 이후 실패 처리. 자동 재실행 루프는 없다.

# 모델·단가 (코드가 아니라 여기서 관리 — 가격 변동 시 이 파일만 갱신)
models:
  haiku:
    model_id: "claude-haiku-4-5-20251001"   # 소유자 확인: 최신 모델 문자열
    input_usd_per_mtok: 1.00                 # 소유자 확인: 현재 단가
    output_usd_per_mtok: 5.00
  sonnet:
    model_id: "claude-sonnet-4-6"
    input_usd_per_mtok: 3.00
    output_usd_per_mtok: 15.00

# 용도별 입력 토큰 상한 (프롬프트 실수로 원문 전체가 딸려가는 사고 방지)
input_token_caps:
  a10_classify: 2000
  g15_quick_answer: 20000
  a9_crosscheck: 120000
